<style>
  :root{--navy:#1F3864;--teal:#0F6E56;--teal-l:#E1F5EE;--amber:#BA7517;--amber-l:#FAEEDA;--ink:#1C1F26;--ink-2:#5B6270;--line:#DDE1E8;--bg:#F6F7F9;--card:#FFF;--danger:#A32D2D}
  *{box-sizing:border-box}
  body,.root{font-family:system-ui,Arial,sans-serif;color:var(--ink);background:var(--bg);margin:0;padding:0}
  .wrap{max-width:1200px;margin:0 auto;padding:28px 20px 60px}
  .eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:6px}
  h1{font-size:22px;margin:0 0 4px;font-weight:600;color:var(--navy)}
  .sub{color:var(--ink-2);font-size:13.5px;margin:0 0 22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:18px}
  .drop{border:1.5px dashed #B7C0D1;border-radius:10px;padding:34px 20px;text-align:center;cursor:pointer;transition:.15s}
  .drop:hover,.drop.drag{border-color:var(--teal);background:var(--teal-l)}
  .drop input{display:none}
  .drop .icon{font-size:26px;margin-bottom:8px;color:var(--navy)}
  .drop .label{font-weight:600;font-size:14px}
  .drop .hint{font-size:12px;color:var(--ink-2);margin-top:4px}
  .filepill{display:inline-flex;align-items:center;gap:8px;background:var(--teal-l);color:var(--teal);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;margin-top:10px}
  .btn{border:none;border-radius:7px;padding:10px 18px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
  .btn-primary{background:var(--navy);color:#fff}
  .btn-primary:hover{background:#132244}
  .btn-primary:disabled{background:#AEB6C4;cursor:not-allowed}
  .btn-teal{background:var(--teal);color:#fff}
  .btn-teal:hover{background:#0B5643}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .status{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-2);margin-top:14px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .section-title{font-size:14px;font-weight:600;color:var(--navy);margin:0 0 12px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 14px}
  label{display:block;font-size:11px;color:var(--ink-2);margin-bottom:3px;font-weight:600}
  input[type=text],input[type=number],select{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-size:13px;color:var(--ink);background:#fff}
  input:focus,select:focus{outline:2px solid var(--teal);outline-offset:1px}
  .fee-block{border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden}
  .fee-head{display:flex;justify-content:space-between;align-items:center;background:#F9FAFB;padding:8px 12px;border-bottom:1px solid var(--line)}
  .fee-head .tag{font-size:11px;background:var(--navy);color:#fff;padding:2px 8px;border-radius:10px;font-weight:600}
  .fee-body{padding:12px}
  .badge-flat{background:#EEF1F6;color:var(--ink-2);font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600}
  .badge-grad{background:var(--teal-l);color:var(--teal);font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid #EFD1D1;padding:5px 10px;font-size:12px}
  .err{background:var(--amber-l);color:var(--amber);border:1px solid #F3D9A8;border-radius:7px;padding:10px 12px;font-size:13px;margin-top:12px}
  .ok{background:var(--teal-l);color:var(--teal);border:1px solid #BEE6D9;border-radius:7px;padding:10px 12px;font-size:13px;margin-top:12px}
  .small-btn{font-size:11px;padding:4px 9px;border-radius:5px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .empty{text-align:center;color:var(--ink-2);font-size:13px;padding:30px 10px}
  .setup-banner{background:#FFF3CD;border:1px solid #FFE69C;border-radius:7px;padding:12px;margin-bottom:18px;font-size:13px}
  .setup-banner .close{float:right;cursor:pointer;color:var(--ink-2);font-weight:bold}
  .hidden-input{display:none}
</style>

<div class="root">
  <div class="wrap">
    <div class="eyebrow">Commercial data tracker</div>
    <h1>PDF → Google Sheet (No API needed)</h1>
    <p class="sub">Upload signed Order Form PDFs. Data extracts automatically and saves directly to your tracker sheet.</p>

    <div class="card setup-banner">
      <strong>Google Apps Script Web App URL:</strong>
      <div class="row" style="margin-top:8px">
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/ABC123.../usercontent" style="flex:1;padding:8px" />
        <button class="btn btn-primary small-btn" id="connectBtn">Connect</button>
        <button class="btn btn-teal small-btn" id="testBtn" style="padding:5px;display:none">Test</button>
        <button class="btn btn-danger small-btn" id="resetBtn" style="padding:5px">Reset</button>
      </div>
      <div id="connectionStatus" style="font-size:12px;color:var(--teal);margin-top:6px"></div>
    </div>

    <div class="card">
      <div class="drop" id="dropZone">
        <input type="file" id="fileInput" class="hidden-input" accept="application/pdf" />
        <div class="icon">📄</div>
        <div class="label">Click to choose a PDF, or drag one here</div>
        <div class="hint">Signed Order Form, any layout</div>
      </div>
      <div id="fileInfo"></div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-primary" id="extractBtn" disabled>Extract & preview</button>
      </div>
      <div id="statusArea"></div>
    </div>

    <div id="previewArea"></div>
    <div id="saveMsg"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfFile = null;
let extracted = null;
let scriptUrl = localStorage.getItem("scriptUrl") || "";

const scriptUrlInput = document.getElementById("scriptUrl");
const connectionStatus = document.getElementById("connectionStatus");

if (scriptUrl) {
  scriptUrlInput.value = scriptUrl;
  connectionStatus.textContent = "✓ Connected";
  document.getElementById("testBtn").style.display = "block";
}

document.getElementById("connectBtn").addEventListener("click", () => {
  const url = scriptUrlInput.value.trim();
  if (!url.startsWith("https://script.google.com")) {
    connectionStatus.textContent = "❌ Invalid URL. Must start with https://script.google.com";
    return;
  }
  localStorage.setItem("scriptUrl", url);
  scriptUrl = url;
  connectionStatus.textContent = "✓ Connected to Google Sheet!";
  document.getElementById("testBtn").style.display = "block";
});

document.getElementById("testBtn").addEventListener("click", async () => {
  if (!scriptUrl) {
    connectionStatus.textContent = "❌ No URL configured";
    return;
  }
  
  connectionStatus.textContent = "⏳ Testing connection...";
  console.log("Testing connection to:", scriptUrl);
  
  try {
    const response = await fetch(scriptUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "saveBatch",
        rows: [{
          "OF Number": "TEST-001",
          "Service": "Test",
          "Fee Type": "Test Fee",
          "Billing Cycle": "Monthly"
        }]
      })
    });
    
    console.log("✓ Response received:", response.status);
    const data = await response.json();
    console.log("✓ Response data:", data);
    
    if (data.status === "success") {
      connectionStatus.innerHTML = "✅ <b>Connection successful!</b> Ready to save data.";
    } else {
      connectionStatus.textContent = `❌ Server error: ${data.message}`;
    }
  } catch (err) {
    console.error("Test error:", err);
    connectionStatus.textContent = `❌ Connection failed: ${err.message}`;
  }
});

document.getElementById("resetBtn").addEventListener("click", () => {
  localStorage.removeItem("scriptUrl");
  scriptUrlInput.value = "";
  scriptUrl = "";
  connectionStatus.textContent = "";
  document.getElementById("testBtn").style.display = "none";
});

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const fileInfo = document.getElementById("fileInfo");
const extractBtn = document.getElementById("extractBtn");
const statusArea = document.getElementById("statusArea");
const previewArea = document.getElementById("previewArea");

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag"));
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("drag");
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (file.type !== "application/pdf") {
    fileInfo.innerHTML = '<div class="err">Please upload a PDF file.</div>';
    return;
  }
  pdfFile = file;
  fileInfo.innerHTML = `<div class="filepill">✓ ${file.name}</div>`;
  extractBtn.disabled = false;
}

async function extractPdf() {
  if (!pdfFile || !scriptUrl) {
    statusArea.innerHTML = '<div class="err">Please connect to Google Apps Script first.</div>';
    return;
  }
  extractBtn.disabled = true;
  statusArea.innerHTML = `<div class="status"><span class="dot"></span> Extracting from PDF...</div>`;
  previewArea.innerHTML = "";
  
  try {
    const text = await extractTextFromPDF(pdfFile);
    console.log("=== RAW PDF TEXT (first 2000 chars) ===");
    console.log(text.substring(0, 2000));
    console.log("=== END TEXT ===");
    
    extracted = parseOFData(text);
    
    // Check if extraction was successful
    const hasData = extracted.of_header.of_number || extracted.of_header.client_name || extracted.fee_rows[0].service;
    
    if (!hasData) {
      statusArea.innerHTML = `
        <div class="err">
          <strong>⚠️ Extraction returned blank data</strong><br/>
          Please check browser console (F12) and share the "RAW PDF TEXT" output.<br/>
          This will help me fix the extraction patterns.
        </div>
      `;
      return;
    }
    
    statusArea.innerHTML = `<div class="ok">✓ Extracted ${extracted.fee_rows.length} fee row(s).</div>`;
    renderPreview();
  } catch (err) {
    statusArea.innerHTML = `<div class="err">Error: ${err.message}</div>`;
    console.error("Extraction error:", err);
  } finally {
    extractBtn.disabled = false;
  }
}

async function extractTextFromPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const textContent = await page.getTextContent();
    text += textContent.items.map(item => item.str).join(" ") + "\n";
  }
  return text;
}

function parseOFData(text) {
  const header = parseOFHeader(text);
  const feeRows = parseFeesFromTableStructure(text);
  return { of_header: header, fee_rows: feeRows };
}

function parseOFHeader(text) {
  // Extract A. Client & Order Form Details section
  const aMatch = text.match(/A\.\s+Client\s+&\s+Order\s+Form\s+Details([\s\S]*?)(?=B\.\s+Service|$)/i);
  if (!aMatch) return {};
  
  const aSection = aMatch[1];
  
  // Split into lines and process each line for label-value pairs
  const lines = aSection.split('\n');
  const headerData = {};
  
  const labelPatterns = {
    "of_number": /OF Number/i,
    "company_id": /Company ID/i,
    "client_name": /Client Name/i,
    "brand": /Brand\s*\/\s*Trade Name/i,
    "billing_currency": /Billing Currency/i,
    "of_value": /Order Form Value/i,
    "sales_channel": /Sales Channel/i,
    "billing_email": /Billing Email/i,
    "start_date": /Start Date/i,
    "of_term": /OF Term/i,
    "end_date": /End Date/i,
    "payment_terms": /Payment Terms/i,
    "client_rep_name": /Client\s+Rep\s*(?:Name)?|Client\s+Representative\s+Name/i,
    "client_rep_mobile": /Client\s+Rep.*Mobile|Phone\s+(?:no|number)?|Mobile/i,
    "client_rep_email": /Client\s+Rep.*Email|Email(?:\s+ID|\s+Address)?/i,
    "sales_rep_name": /Sales\s+Rep\s*(?:Name)?|Sales\s+Rep\s*\(Fynd\)\s*(?:Name)?/i,
    "sales_rep_email": /Sales\s+Rep.*Email|Email.*Fynd/i,
    "auto_renewal": /Auto Renewal/i,
    "bundle": /Bundle/i,
    "po_required": /PO Required/i
  };
  
  lines.forEach(line => {
    // Split line by multiple spaces (2 or more)
    const parts = line.split(/\s{2,}/).map(p => p.trim()).filter(p => p);
    
    // Process parts as label-value pairs
    for (let i = 0; i < parts.length; i += 2) {
      const potentialLabel = parts[i];
      const value = parts[i + 1] || "";
      
      // Check if this part is a known label
      for (const [key, pattern] of Object.entries(labelPatterns)) {
        if (pattern.test(potentialLabel)) {
          // For Client Rep fields, also check if next parts contain data for this field
          if (key === "client_rep_name" && !value) {
            // If Client Rep Name label found but no value, try to get value from next part
            if (i + 2 < parts.length && !Object.values(labelPatterns).some(p => p.test(parts[i + 2]))) {
              headerData[key] = parts[i + 2];
              i++; // Skip the next part since we used it
            }
          } else {
            headerData[key] = value;
          }
          break;
        }
      }
    }
    
    // Additional pass: look for Client Rep Name if not found yet
    if (!headerData.client_rep_name) {
      const clientRepMatch = line.match(/Client\s+Rep\s+Name\s+(.+?)(?:\s{2,}|$)/i);
      if (clientRepMatch) {
        headerData.client_rep_name = clientRepMatch[1].trim();
      }
    }
  });
  
  // Post-process header data to split Name and Email fields
  const splitNameEmail = (nameEmailStr) => {
    if (!nameEmailStr) return { name: "", email: "" };
    
    // Clean up the string first
    nameEmailStr = nameEmailStr.trim().replace(/\s+/g, " ");
    
    // Split by " : " or look for email pattern
    const parts = nameEmailStr.split(/\s*:\s*|\s+(?=\S+@\S+)/);
    
    let name = "", email = "";
    
    for (const part of parts) {
      const cleanPart = part.trim();
      if (cleanPart.includes("@")) {
        email = cleanPart;
      } else if (cleanPart && !cleanPart.match(/^\d+$/)) { // Not just numbers
        if (!name) name = cleanPart;
        else name = name + " " + cleanPart;
      }
    }
    
    return { name: name.trim(), email: email.trim() };
  };

  // Extract phone number from text
  const extractPhone = (text) => {
    if (!text) return "";
    // Match 10 digit phone number or phone with patterns like 9876543210
    const phoneMatch = text.match(/\b(\d{10})\b|\b(\d{3}[-\s]?\d{3}[-\s]?\d{4})\b/);
    return phoneMatch ? phoneMatch[0].replace(/[-\s]/g, "") : "";
  };

  // Split Client Rep fields (Name, Mobile, Email might be mixed)
  if (headerData.client_rep_name) {
    let clientRepStr = headerData.client_rep_name.trim().replace(/\s+/g, " ");
    
    // Extract phone if present
    const phone = extractPhone(clientRepStr);
    if (phone) {
      headerData.client_rep_mobile = phone;
      clientRepStr = clientRepStr.replace(phone, "").trim();
    }
    
    // Extract email if present
    const emailMatch = clientRepStr.match(/\S+@\S+/);
    if (emailMatch) {
      headerData.client_rep_email = emailMatch[0];
      clientRepStr = clientRepStr.replace(emailMatch[0], "").trim();
    }
    
    // What's left is the name
    if (clientRepStr) {
      headerData.client_rep_name = clientRepStr.replace(/^:\s*|\s*:\s*$/g, "").trim();
    }
  }

  // Split Sales Rep if it has both name and email
  if (headerData.sales_rep_name) {
    let salesRepStr = headerData.sales_rep_name.trim().replace(/\s+/g, " ");
    
    if (salesRepStr.includes("@") || salesRepStr.includes(":")) {
      const split = splitNameEmail(salesRepStr);
      console.log("Sales Rep split:", { original: salesRepStr, split });
      headerData.sales_rep_name = split.name;
      headerData.sales_rep_email = split.email;
    } else {
      // Just clean up extra spaces and colons
      headerData.sales_rep_name = salesRepStr.replace(/\s+$|\s*:\s*$/, "").trim();
    }
  }

  // Clean up all string fields - remove trailing/leading spaces and colons
  Object.keys(headerData).forEach(key => {
    if (typeof headerData[key] === "string") {
      let value = headerData[key];
      
      // Remove special characters: dots, middle dots, etc.
      value = value
        .replace(/·/g, "")  // Remove middle dot (·)
        .replace(/•/g, "")  // Remove bullet point
        .replace(/\./g, "")  // Remove periods/dots
        .trim()
        .replace(/\s+/g, " ")  // Normalize whitespace
        .replace(/^:\s*|\s*:\s*$/g, "")  // Remove leading/trailing colons with spaces
        .replace(/\s*:\s*$/g, "")  // Remove trailing colon
        .trim();  // Final trim
      
      headerData[key] = value;
    }
  });

  console.log("=== Cleaned header data ===", headerData);

  const convertDate = (dateStr) => {
    if (!dateStr) return "";
    
    const monthMap = {
      "jan": "01", "january": "01", "feb": "02", "february": "02",
      "mar": "03", "march": "03", "apr": "04", "april": "04", "may": "05",
      "jun": "06", "june": "06", "jul": "07", "july": "07", "aug": "08",
      "august": "08", "sep": "09", "september": "09", "oct": "10",
      "october": "10", "nov": "11", "november": "11", "dec": "12", "december": "12"
    };
    
    const match = dateStr.match(/(\d{1,2})\s+(\w+)\s+(\d{4})/i);
    if (match) {
      const day = match[1].padStart(2, "0");
      const month = monthMap[match[2].toLowerCase()];
      const year = match[3];
      if (month) return `${year}-${month}-${day}`;
    }
    
    if (dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) return dateStr;
    return dateStr;
  };

  const parseTerms = (termStr) => {
    if (!termStr) return { number: "", unit: "" };
    
    // Match pattern like "24 Months", "12 Years", "36 Months", etc.
    const match = termStr.match(/^(\d+)\s*(\w+)$/i);
    if (match) {
      return { number: match[1], unit: match[2] };
    }
    
    // If no match, return full string as number and empty unit
    return { number: termStr, unit: "" };
  };

  const termParts = parseTerms(headerData.of_term || "");

  return {
    of_number: headerData.of_number || "",
    company_id: headerData.company_id || "",
    client_name: headerData.client_name || "",
    brand: headerData.brand || "",
    billing_currency: headerData.billing_currency || "",
    of_value: parseFloat((headerData.of_value || "").replace(/[₹$\s,]/g, "")) || 0,
    sales_channel: headerData.sales_channel || "",
    billing_email: headerData.billing_email || "",
    start_date: convertDate(headerData.start_date || ""),
    of_term_number: termParts.number || "",
    of_term_unit: termParts.unit || "",
    end_date: convertDate(headerData.end_date || ""),
    payment_terms: headerData.payment_terms || "",
    client_rep_name: headerData.client_rep_name || "",
    client_rep_mobile: headerData.client_rep_mobile || "",
    client_rep_email: headerData.client_rep_email || "",
    sales_rep_name: headerData.sales_rep_name || "",
    sales_rep_email: headerData.sales_rep_email || "",
    auto_renewal: headerData.auto_renewal || "",
    bundle: headerData.bundle || "Yes",
    po_required: headerData.po_required || ""
  };
}

function parseFeesFromTableStructure(text) {
  const feeRows = [];
  
  console.log("=== STARTING FEE EXTRACTION ===");
  
  // Extract B. Service Details section
  const bStart = text.indexOf("B. Service");
  const cStart = text.indexOf("C. Special") > -1 ? text.indexOf("C. Special") : text.indexOf("C.");
  
  if (bStart === -1) {
    console.log("ERROR: B. Service section not found");
    return [];
  }
  
  const bEnd = cStart !== -1 ? cStart : text.length;
  const bSection = text.substring(bStart, bEnd);
  
  console.log("B section length:", bSection.length);
  console.log("B section preview:", bSection.substring(0, 300));
  
  // Define fee types
  const feeTypes = [
    "Setup Fee", "One-Time Fee", "Subscription Fee",
    "Transaction Fee", "Usage Fee", "Licensing Fee", "Platform Fee"
  ];
  
  // Find all services (a. NAME, b. NAME, etc.)
  console.log("\n=== FINDING SERVICES ===");
  const serviceRegex = /[a-z]\.\s+([^\n]+?)(?=[a-z]\.|\$)/g;
  let serviceMatch;
  const services = [];
  
  while ((serviceMatch = serviceRegex.exec(bSection)) !== null) {
    let serviceName = serviceMatch[1].trim();
    
    // Clean up service name - remove "Fee Type" and everything after it if present
    // Split by 2+ spaces to get just the service name part
    const parts = serviceName.split(/\s{2,}/);
    serviceName = parts[0].trim(); // Take only the first part (service name)
    
    // Remove "Fee Type" if it somehow got included
    serviceName = serviceName.replace(/\s*Fee\s+Type.*/i, "").trim();
    
    // Only add if we have a valid service name
    if (serviceName && serviceName.length > 2) {
      services.push({
        name: serviceName,
        idx: serviceMatch.index
      });
      console.log(`Found service: "${serviceName}"`);
    }
  }
  
  console.log("Total services found:", services.length);
  
  // For each service, find fees
  console.log("\n=== EXTRACTING FEES ===");
  
  for (let s = 0; s < services.length; s++) {
    const serviceName = services[s].name;
    const serviceStartIdx = services[s].idx;
    const serviceEndIdx = s + 1 < services.length ? services[s + 1].idx : bSection.length;
    const serviceContent = bSection.substring(serviceStartIdx, serviceEndIdx);
    
    console.log(`\nProcessing service "${serviceName}":`);
    
    // Find all fee types in this service
    for (const feeType of feeTypes) {
      const feeIdx = serviceContent.indexOf(feeType);
      if (feeIdx === -1) continue;
      
      console.log(`  Found: ${feeType}`);
      
      // Get everything after the fee type
      const afterFeeType = serviceContent.substring(feeIdx + feeType.length).trim();
      
      // Find the next fee type
      let nextFeeIdx = -1;
      for (const otherFee of feeTypes) {
        const idx = afterFeeType.indexOf(otherFee);
        if (idx > 0) {
          if (nextFeeIdx === -1 || idx < nextFeeIdx) {
            nextFeeIdx = idx;
          }
        }
      }
      
      // Extract fee data
      const feeDataRaw = nextFeeIdx > 0 ? afterFeeType.substring(0, nextFeeIdx) : afterFeeType;
      
      // Split by multiple spaces
      const parts = feeDataRaw.split(/\s{2,}/).map(p => p.trim()).filter(p => p);
      
      if (parts.length < 1) {
        console.log(`    Skipped: no parts`);
        continue;
      }
      
      console.log(`    Parts: ${parts.slice(0, 3).join(" | ")}`);
      
      // parts[0] = Billing Cycle
      // parts[1+] = Value & other
      const billingCycle = parts[0];
      const valueData = parts.slice(1).join(" ");
      
      let flatValue = 0;
      let pricingModel = "Flat";
      let tiers = [];
      let rateUnit = "";
      let inclusions = "";
      let milestone = "";
      
      // Extract flat value first
      const flatMatch = valueData.match(/[₹]\s*([0-9,]+)/);
      if (flatMatch) {
        flatValue = parseInt(flatMatch[1].replace(/,/g, ""));
        console.log(`    Flat: ₹${flatValue}`);
      }
      
      // Extract graduated - look for rates with symbols (₹ or %)
      const tier1 = valueData.match(/0[–-](\d+):\s*([₹%]?)\s*([0-9.]+)\s*per\s+(\w+)/);
      const tier2 = valueData.match(/(\d+)[–-]∞:\s*([₹%]?)\s*([0-9.]+)\s*per\s+(\w+)/);
      
      if (tier1 && tier2) {
        const tier1To = parseInt(tier1[1]);
        const tier1Symbol = tier1[2];  // ₹ or % or empty
        const tier1Rate = parseFloat(tier1[3]);
        const tier1Unit = tier1[4];
        
        // Determine pricing model based on rate symbol
        if (tier1Symbol === "₹" || !tier1Symbol) {
          pricingModel = "Graduated Flat";  // ₹ or no symbol means flat rupees
        } else if (tier1Symbol === "%") {
          pricingModel = "Graduated Fixed";  // % means fixed percentage
        } else {
          pricingModel = "Graduated";  // Fallback
        }
        
        const tier2Symbol = tier2[2];
        const tier2Rate = parseFloat(tier2[3]);
        
        tiers = [
          { from: 0, to: tier1To, rate: tier1Rate },
          { from: tier1To + 1, to: null, rate: tier2Rate }
        ];
        rateUnit = tier1Unit;
        console.log(`    ${pricingModel}: Tier1(0-${tier1To}:${tier1Symbol}${tier1Rate}), Tier2(${tier1To + 1}-∞:${tier2Symbol}${tier2Rate}) per ${tier1Unit}`);
      }
      
      // Extract inclusions and charged on status
      const inclMatch = valueData.match(/(\d+\s+(?:Shipment|Item|Warehouse|User|Order|SKU|Merchant)[\s\w,()]*)/i);
      if (inclMatch) {
        inclusions = inclMatch[1].trim();
        
        // Extract charging status from inclusions like "(Placed)", "= X Item", etc.
        const chargedOnPatterns = [
          /\(Placed\)/i,
          /= \d+\s+\w+/,  // Matches "= 10 Item"
          /Monthly on Actuals/i,
          /Daily/i,
          /Weekly/i,
          /Per Transaction/i
        ];
        
        for (const pattern of chargedOnPatterns) {
          const match = inclusions.match(pattern);
          if (match) {
            const chargedStatus = match[0].trim();
            if (!milestone) {  // Only set if no milestone already found
              milestone = chargedStatus;
            }
            break;
          }
        }
      }
      
      // Check for bag status values in valueData
      const bagStatusPatterns = [
        { pattern: /bag_packed/i, value: "bag_packed" },
        { pattern: /placed/i, value: "placed" },
        { pattern: /delivery_done/i, value: "delivery_done" },
        { pattern: /bag_invoiced/i, value: "bag_invoiced" }
      ];
      
      for (const statusCheck of bagStatusPatterns) {
        if (statusCheck.pattern.test(valueData)) {
          milestone = statusCheck.value;
          console.log(`    Bag status found: ${milestone}`);
          break;  // Use first match
        }
      }
      
      // Extract milestone/charged on status
      const milestoneMatch = valueData.match(/(50%\s+on\s+[^–]*|100%\s+on\s+[^–]*|Before\s+Going-Live|Execution of OF|Monthly on Actuals|Daily|Weekly|Per Transaction)/i);
      if (milestoneMatch && !milestone) {  // Don't override if already found from inclusions
        milestone = milestoneMatch[1].trim();
      }
      
      // Add if has value
      if (flatValue > 0 || tiers.length > 0) {
        console.log(`    ✓ Added to fees`);
        
        // Final cleanup of service name to ensure it's just the name
        let cleanServiceName = serviceName.replace(/\s*Fee\s+Type.*/i, "").trim();
        
        // Log tier data for debugging
        if (tiers.length > 0) {
          console.log(`    Tier data: ${JSON.stringify(tiers)}`);
        }
        
        feeRows.push({
          service: cleanServiceName,
          fee_type: feeType,
          billing_cycle: billingCycle,
          pricing_model: pricingModel,
          flat_value: flatValue,
          tiers: tiers,
          rate_unit: rateUnit,
          billing_basis_note: "",
          inclusions: inclusions,
          milestone: milestone
        });
      }
    }
  }
  
  console.log("\n=== EXTRACTION COMPLETE ===");
  console.log("Total fees extracted:", feeRows.length);
  
  return feeRows;
}

function renderFeeRows() {

  }
  
  // Group fees by service
  const serviceGroups = {};
  const serviceOrder = [];
  extracted.fee_rows.forEach(fee => {
    if (!serviceGroups[fee.service]) {
      serviceGroups[fee.service] = [];
      serviceOrder.push(fee.service);
    }
    serviceGroups[fee.service].push(fee);
  });
  
  // Render each service as a table with letter prefix
  let html = '';
  const letters = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j'];
  
  serviceOrder.forEach((serviceName, serviceIdx) => {
    const fees = serviceGroups[serviceName];
    const letterPrefix = letters[serviceIdx] || (serviceIdx + 1);
    const serviceHeader = `${letterPrefix}. ${serviceName}`;
    
    html += `

                <th style="padding: 12px 14px; text-align: left; border-right: 1px solid #1F3864; font-weight: 600;">Fee Type</th>
                <th style="padding: 12px 14px; text-align: left; border-right: 1px solid #1F3864; font-weight: 600;">Billing Cycle</th>
                <th style="padding: 12px 14px; text-align: left; border-right: 1px solid #1F3864; font-weight: 600;">Commercial Value</th>
                <th style="padding: 12px 14px; text-align: left; border-right: 1px solid #1F3864; font-weight: 600;">Inclusions</th>
                <th style="padding: 12px 14px; text-align: left; font-weight: 600;">Charged On</th>
              </tr>
            </thead>
            <tbody>
    `;
    
    fees.forEach((fee, idx) => {
      const bgColor = idx % 2 === 0 ? "#ffffff" : "#F9FAFB";
      
      // Format commercial value
      let commercialValue = "";
      if (fee.pricing_model === "Flat") {
        commercialValue = `₹${fee.flat_value.toLocaleString('en-IN')}`;
      } else if (fee.pricing_model && fee.pricing_model.includes("Graduated")) {
        // Handle Graduated Flat, Graduated Fixed, or generic Graduated
        commercialValue = fee.tiers.map((tier, i) => {
          if (i === 0) {
            return `0–${tier.to}: ₹${tier.rate} ${fee.rate_unit}<br>`;
          } else {
            return `${tier.from}–∞: ₹${tier.rate} ${fee.rate_unit}`;
          }
        }).join("");
      }
      
      html += `
        <tr style="background: ${bgColor}; border-bottom: 1px solid #EEE;">
          <td style="padding: 12px 14px; border-right: 1px solid #EEE;">${fee.fee_type}</td>
          <td style="padding: 12px 14px; border-right: 1px solid #EEE;">${fee.billing_cycle}</td>

          <td style="padding: 12px 14px; border-right: 1px solid #EEE; font-size: 12px; color: #5B6270; line-height: 1.6;">${fee.inclusions || "—"}</td>
          <td style="padding: 12px 14px; font-size: 12px; color: #5B6270; line-height: 1.6;">${fee.milestone || "—"}</td>
        </tr>
      `;
    });
    
    html += `
            </tbody>
          </table>
        </div>
      </div>
    `;
  });
  
  wrap.innerHTML = html;
}

function bindFeeBlock(idx) {
  const block = document.querySelector(`.fee-block[data-idx="${idx}"]`);
  if (!block) return;
  block.querySelectorAll("[data-f]").forEach(el => {
    el.addEventListener("input", () => {
      const key = el.dataset.f;
      let val = el.value;
      if (key === "flat_value") val = parseFloat(val) || 0;
      extracted.fee_rows[idx][key] = val;
    });
  });
  const removeBtn = document.querySelector(`[data-remove="${idx}"]`);
  if (removeBtn) removeBtn.addEventListener("click", () => {
    extracted.fee_rows.splice(idx, 1);
    renderPreview();
  });
}

async function saveToSheet() {
  if (!scriptUrl) {
    document.getElementById("saveMsg").innerHTML = '<div class="err">❌ No connection to Google Sheet. Configure the URL at the top first.</div>';
    return;
  }
  
  if (!extracted.fee_rows || extracted.fee_rows.length === 0) {
    document.getElementById("saveMsg").innerHTML = '<div class="err">❌ No fees extracted. Please extract data first.</div>';
    return;
  }
  
  document.getElementById("saveMsg").innerHTML = '<div class="ok">⏳ Saving to Google Sheet...</div>';
  
  const h = extracted.of_header;
  const rows = extracted.fee_rows.map(fr => {
    const obj = {};
    obj["Status"] = "Onboarding";
    obj["Live Date"] = "";
    obj["Churn Date"] = "";
    obj["Expired Date"] = "";
    obj["Last Updated"] = "";
    obj["OF Number"] = h.of_number;
    obj["Company ID"] = h.company_id;
    obj["Client Name"] = h.client_name;
    obj["Brand / Trade Name"] = h.brand;
    obj["Billing Currency"] = h.billing_currency;
    obj["OF Value"] = h.of_value;
    obj["Sales Channel"] = h.sales_channel;
    obj["Billing Email"] = h.billing_email;
    obj["OF Start Date"] = h.start_date;
    obj["OF Term Number"] = h.of_term_number;
    obj["OF Term Unit"] = h.of_term_unit;
    obj["OF End Date"] = h.end_date;
    obj["Payment Terms"] = h.payment_terms;
    obj["Client Rep Name"] = h.client_rep_name;
    obj["Client Rep Mobile"] = h.client_rep_mobile;
    obj["Client Rep Email"] = h.client_rep_email;
    obj["Sales Rep (Fynd) Name"] = h.sales_rep_name;
    obj["Sales Rep (Fynd) Email"] = h.sales_rep_email;
    obj["Auto Renewal"] = h.auto_renewal;
    obj["Bundle"] = h.bundle;
    obj["PO Required"] = h.po_required;
    obj["Service"] = fr.service;
    obj["Billing Start Date"] = "";
    obj["Subscription Start Date"] = "";
    obj["Next Billing Date"] = "";
    obj["Fee Type"] = fr.fee_type;
    obj["Billing Cycle"] = fr.billing_cycle;
    obj["Pricing Model"] = fr.pricing_model;
    obj["Flat Value"] = fr.pricing_model === "Flat" ? fr.flat_value : "";
    
    // Populate tier data - ensure 0 values are preserved explicitly
    for (let t = 0; t < 5; t++) {
      if (t < fr.tiers.length) {
        const tier = fr.tiers[t];
        // For "from" and "to", preserve 0 and other values
        obj[`Tier ${t+1} From`] = (tier.from === 0 || tier.from) ? tier.from : "";
        obj[`Tier ${t+1} To`] = (tier.to === 0 || tier.to) ? tier.to : "";
        // For "rate", explicitly check for 0 and preserve it
        obj[`Tier ${t+1} Rate`] = (tier.rate === 0 || tier.rate) ? tier.rate : "";
        if (t === 0) {
          console.log(`Fee ${fr.fee_type}: Tier 1 = From:${tier.from}, To:${tier.to}, Rate:${tier.rate} (rate type: ${typeof tier.rate})`);
        }
      } else {
        obj[`Tier ${t+1} From`] = "";
        obj[`Tier ${t+1} To`] = "";
        obj[`Tier ${t+1} Rate`] = "";
      }
    }
    
    obj["Based on"] = fr.rate_unit;
    
    // Calculate Shipment based Flat: if Based on = Shipment, extract the ₹ value
    let shipmentBasedFlat = "";
    if (fr.rate_unit && fr.rate_unit.toLowerCase().includes("shipment")) {
      if (fr.flat_value > 0) {
        shipmentBasedFlat = `₹${fr.flat_value.toLocaleString('en-IN')}`;
      } else if (fr.tiers && fr.tiers.length > 0) {
        // For graduated, show the first tier rate
        const firstTierRate = fr.tiers[0].rate;
        if (firstTierRate >= 0) {
          shipmentBasedFlat = `₹${firstTierRate}`;
        }
      }
    }
    obj["Shipment based Flat"] = shipmentBasedFlat;
    
    obj["Billing Basis Note"] = fr.billing_basis_note;
    obj["Inclusions"] = fr.inclusions;
    obj["Milestone / Charged On"] = fr.milestone;
    return obj;
  });
  
  console.log("=== SAVING TO GOOGLE SHEET ===");
  console.log("URL:", scriptUrl);
  console.log("Rows:", rows.length);
  
  // Add PDF filename to all rows (will be updated with link after upload)
  const pdfFileName = pdfFile ? pdfFile.name : "";
  console.log("PDF File Name:", pdfFileName);
  
  // If we have a PDF file, read it and send for upload
  if (pdfFile && scriptUrl) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        // Get base64 data
        const pdfBase64 = e.target.result.split(',')[1];
        console.log("PDF converted to base64, length:", pdfBase64.length);
        
        // Step 1: Upload PDF to Google Drive
        const uploadPayload = JSON.stringify({
          action: "uploadPDF",
          pdfFileName: pdfFileName,
          pdfBase64: pdfBase64
        });
        
        console.log("Uploading PDF to Google Drive...");
        
        fetch(scriptUrl, {
          method: "POST",
          body: uploadPayload
        })
        .then(response => response.json())
        .then(uploadResult => {
          console.log("Upload response:", uploadResult);
          
          if (uploadResult.status === "success" && uploadResult.pdfLink) {
            const pdfLink = uploadResult.pdfLink;
            console.log("✅ PDF uploaded! Link:", pdfLink);
            
            // Step 2: Update rows with PDF link
            rows.forEach(row => {
              row["PDF Attachment"] = pdfLink;  // Store the clickable link!
            });
            
            // Step 3: Save to sheet with PDF link
            console.log("Saving rows with PDF link...");
            saveRowsToSheet(rows);
          } else {
            console.error("❌ PDF upload failed:", uploadResult.message);
            // Fall back to saving with filename only
            rows.forEach(row => {
              row["PDF Attachment"] = pdfFileName;
            });
            saveRowsToSheet(rows);
          }
        })
        .catch(error => {
          console.error("Upload error:", error);
          // Fall back to filename
          rows.forEach(row => {
            row["PDF Attachment"] = pdfFileName;
          });
          saveRowsToSheet(rows);
        });
      } catch (err) {
        console.error("PDF processing error:", err);
        rows.forEach(row => {
          row["PDF Attachment"] = pdfFileName;
        });
        saveRowsToSheet(rows);
      }
    };
    
    reader.onerror = function(err) {
      console.error("File read error:", err);
      rows.forEach(row => {
        row["PDF Attachment"] = pdfFileName;
      });
      saveRowsToSheet(rows);
    };
    
    reader.readAsDataURL(pdfFile);
  } else {
    // No PDF file, save with empty attachment
    rows.forEach(row => {
      row["PDF Attachment"] = "";
    });
    saveRowsToSheet(rows);
  }
}

function saveRowsToSheet(rows) {
  console.log("saveRowsToSheet: " + rows.length + " rows");
  
  try {
    // Create the request body
    const requestBody = JSON.stringify({
      action: "saveBatch",
      rows: rows
    });
    
    console.log("Sending saveBatch request...");
    
    // Send to Google Apps Script (no Content-Type header)
    fetch(scriptUrl, {
      method: "POST",
      body: requestBody
    })
    .then(response => response.json())
    .then(result => {
      console.log("Save response:", result);
      
      if (result.status === "success") {
        document.getElementById("saveMsg").innerHTML = `<div class="ok">✅ <b>Success!</b> Saved ${rows.length} rows to Google Sheet</div>`;
        setTimeout(() => {
          const previewArea = document.getElementById("feeRowsWrap");
          if (previewArea) previewArea.innerHTML = "";
          const fileInfo = document.getElementById("fileInfo");
          if (fileInfo) fileInfo.innerHTML = "";
          document.getElementById("fileInput").value = "";
        }, 2000);
      } else {
        throw new Error(result.message || "Server error");
      }
    })
    .catch(err => {
      console.error("Save error:", err);
      document.getElementById("saveMsg").innerHTML = `<div class="err">❌ Error: ${err.message}<br><small>Check F12 Console</small></div>`;
    });
    
  } catch (err) {
    console.error("Save failed:", err);
    document.getElementById("saveMsg").innerHTML = `<div class="err">❌ Error: ${err.message}<br><small>Check F12 Console</small></div>`;
  }
}
